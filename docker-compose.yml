
version: '3.8'

services:
  api:
    build: .
    container_name: recommendation-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data  # Persist SQLite database
    environment:
      - DATABASE_URL=sqlite:///./data/recommendation.db
      - SECRET_KEY=your-secret-key-here
    restart: unless-stopped
